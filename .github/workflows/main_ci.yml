name: Pipeline CI/CD PROINF OUTFITDIA

on:
  push:
    branches: [ 'feature/*', 'main']
  
  pull_request:
    branches: [ 'develop', 'main' ]


jobs:

  integracion-continua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Instalar Dependencias Backend
        run: |
          cd backend
          npm ci

      - name: Generar Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Ejecutar Pruebas Unitarias (Cobertura 70%)
        run: |
          cd backend
          npm test

      - name: Build Frontend Ionic
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: |
          cd frontend
          npm ci
          npm run build

  # --- TRABAJO DE DESPLIEGUE CONTINUO (CD) ---
  despliegue-continuo:
    needs: integracion-continua
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Simulación de Despliegue
        run: |
          echo "Desplegando en entorno de producción..."
          echo "Pipeline completado con éxito."