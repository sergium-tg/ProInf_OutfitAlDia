name: CI OUTFITALDIA

on:
  push:
    branches: [ main, dev, refinado-codigo ]
  pull_request:
    branches: [ main, dev ]

jobs:
  frontend-ci:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests with Coverage
        run: npm run test.coverage

  backend-ci:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: outfitaldia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      # ESTE ES EL PASO CLAVE:
      # Creamos un .env real dentro del servidor de GitHub para que Prisma 
      # lo lea automáticamente y no lance el PrismaConfigEnvError.
      - name: Inyectar variables de entorno físicas
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/outfitaldia_test" > .env
          echo "JWT_SECRET=test_secret_key" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Database Schema
        run: npx prisma db push

      - name: Run Backend Tests
        run: npm run test:coverage