name: CI OUTFITALDIA

on:
  push:
    branches: [ main, dev, refinado-codigo ]
  pull_request:
    branches: [ main, dev ]

jobs:
  frontend-ci:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests with Coverage
        run: npm run test.coverage

  backend-ci:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: outfitaldia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      # Forzamos la variable en el Shell de Linux antes de llamar a Prisma
      - name: Generate Prisma Client
        run: |
          export DATABASE_URL="postgresql://user:password@localhost:5432/outfitaldia_test"
          npx prisma generate

      - name: Push Database Schema
        run: |
          export DATABASE_URL="postgresql://user:password@localhost:5432/outfitaldia_test"
          npx prisma db push

      - name: Run Backend Tests
        run: |
          export DATABASE_URL="postgresql://user:password@localhost:5432/outfitaldia_test"
          export JWT_SECRET="test_secret_key"
          npm run test:coverage